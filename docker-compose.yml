services:
  app:
    image: dthuongqt812/express-app:latest
    container_name: express-app
    ports:
      - "8080:8080"

  watchtower:
    image: containrrr/watchtower:latest  # <--- Dùng lại bản mới nhất
    container_name: watchtower
    environment:
      - WATCHTOWER_POLL_INTERVAL=60
      - DOCKER_API_VERSION=1.40  # <--- Ép client của Watchtower dùng API 1.40
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock